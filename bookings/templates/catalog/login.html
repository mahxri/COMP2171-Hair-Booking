<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hair By Lasheka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FBF8F1; 
            --text-main: #2C241B; 
            --accent-gold: #B88A44; 
            --heading-font: 'Playfair Display', serif;
            --body-font: 'Lato', sans-serif;
            --signature-font: 'Great Vibes', cursive;
        }

        body {
            font-family: var(--body-font);
            /* Consistent Mocha Gradient */
            background: linear-gradient(to bottom, #3A2618 0%, #3A2618 25%, var(--bg-color) 85%);
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Styles (Exact Match) */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; }
        .nav-brand { font-family: var(--signature-font); font-weight: 400; font-size: 2.5rem; color: #FFFFFF; text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 15px; }
        .nav-glass-btn { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); color: #FFFFFF !important; font-family: var(--body-font); font-size: 0.9rem; text-decoration: none; padding: 10px 24px; border-radius: 50px; transition: all 0.3s ease; }
        .nav-glass-btn:hover { background: rgba(255, 255, 255, 0.18); border: 1px solid rgba(255, 255, 255, 0.4); transform: translateY(-2px); color: var(--accent-gold) !important; }

        /* Auth Container Layout */
        .auth-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* The Premium Glass Card */
        .auth-card {
            background: rgba(44, 36, 27, 0.7); /* Dark semi-transparent mocha */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            color: #FFFFFF;
        }

        .auth-card h2 {
            font-family: var(--heading-font);
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: #FFFFFF;
        }

        .auth-card p.subtitle {
            color: var(--accent-gold);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* Styling Django's Form Elements */
        .auth-card label {
            display: block;
            text-align: left;
            font-size: 0.9rem;
            color: #E8E1D9;
            margin-bottom: 5px;
        }

        .auth-card input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05); /* Transparent input boxes */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #FFFFFF;
            font-family: var(--body-font);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .auth-card input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(184, 138, 68, 0.2);
        }

        .auth-card button[type="submit"] {
            width: 100%;
            background-color: var(--accent-gold);
            color: #FFFFFF;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-family: var(--body-font);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .auth-card button[type="submit"]:hover {
            background-color: #9A7338;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(184, 138, 68, 0.4);
        }

        .auth-links {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #E8E1D9;
        }

        .auth-links a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        
        .auth-links a:hover {
            color: #FFFFFF;
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="{% url 'home' %}" class="nav-brand">Hair By Lasheka</a>
        <div class="nav-links">
            <a href="{% url 'home' %}" class="nav-glass-btn">Home</a>
            <a href="{% url 'catalog' %}" class="nav-glass-btn">Services</a>
            {% if user.is_authenticated %}
            <a href="{% url 'my_appointments' %}" class="nav-glass-btn">Appointments</a>
            {% endif %}
            <a href="{% url 'register' %}" class="nav-glass-btn" style="border-color: var(--accent-gold); color: var(--accent-gold) !important;">Register</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Log in to your account</p>
            
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Log In</button>
            </form>
            
            <div class="auth-links">
                Don't have an account? <a href="{% url 'register' %}">Create one here</a>
            </div>
        </div>
    </div>

</body>
</html>
