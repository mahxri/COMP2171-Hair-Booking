<!DOCTYPE html>
<html>
<head>
    <title>Register - Hair by Lasheka</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; background: #d4af37; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        ul { list-style-type: none; padding: 0; color: #666; font-size: 0.85rem; text-align: left; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Create an Account</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>
        <p style="margin-top: 20px;">Already have an account? <a href="{% url 'login' %}">Log in here</a></p>
    </div>
</body>
</html>
